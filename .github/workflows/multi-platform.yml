on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'base-r/**'
      - 'base-r-alpine/**'
      - 'rstudio/**'
      - '.github/workflows/multi-platform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'base-r/**'
      - 'base-r-alpine/**'
      - 'rstudio/**'
      - '.github/workflows/multi-platform.yml'
  schedule:
    - cron: '0 18 * * 0' # run Sundays at 18

name: Publish Docker image, both arm and amd

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  push_base_r:
    name: base-r
    env:
      name: base-r
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      context: ./${{ name }}/.
      file: ./${{ name }}/Dockerfile
      cache: true
      meta-images: rapporteket/${{ name }}
      meta-tags: |
        type=semver,pattern={{major}}.{{minor}}.{{patch}}
        type=ref,event=branch
        type=schedule,pattern=weekly
      build-args: |
        GITHUB_PAT=${{ secrets.GITHUB_TOKEN }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  push_base_r-alpine:
    name: base-r-alpine
    env:
      name: base-r-alpine
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      context: ./${{ name }}/.
      file: ./${{ name }}/Dockerfile
      cache: true
      meta-images: rapporteket/${{ name }}
      meta-tags: |
        type=semver,pattern={{major}}.{{minor}}.{{patch}}
        type=ref,event=branch
        type=schedule,pattern=weekly
      build-args: |
        GITHUB_PAT=${{ secrets.GITHUB_TOKEN }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  push_rstudio:
    name: rstudio
    env:
      name: rstudio
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      context: ./${{ name }}/.
      file: ./${{ name }}/Dockerfile
      cache: true
      meta-images: rapporteket/${{ name }}
      meta-tags: |
        type=semver,pattern={{major}}.{{minor}}.{{patch}}
        type=ref,event=branch
        type=schedule,pattern=weekly
      build-args: |
        GITHUB_PAT=${{ secrets.GITHUB_TOKEN }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
